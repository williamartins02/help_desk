<mat-drawer-container class="container" autosize>
  <!-- Botão hambúrguer sempre visível, flutuante, alinhado ao topo do menu lateral -->
  <button class="floating-menu-toggle" mat-icon-button (click)="drawer.toggle()" aria-label="Alternar menu"
        [class.menu-open]="isMenuOpen">
    <mat-icon>menu</mat-icon>
  </button>

  <mat-drawer #drawer class="sidenav" mode="side">
    <!-- ── Seção de identidade ── -->
    <div class="brand-header">
      <div class="brand-icon-wrap">
        <mat-icon>support_agent</mat-icon>
      </div>
      <div class="brand-info">
        <span class="brand-name">Help Desk</span>
        <span class="brand-sub">Sistema de Chamados</span>
      </div>
    </div>

    <!-- ── Label de seção ── -->
    <p class="nav-section-label">Navegação</p>

    <!-- ── Itens de navegação ── -->
    <mat-nav-list class="nav-list">
      <a mat-list-item routerLink="home" routerLinkActive="active-link" class="link-home"
         [routerLinkActiveOptions]="{exact: true}">
        <mat-icon class="nav-icon">home</mat-icon>
        <span class="nav-label">Home</span>
      </a>
      <a mat-list-item routerLink="tecnicos" routerLinkActive="active-link" class="link-tecnicos">
        <mat-icon class="nav-icon">engineering</mat-icon>
        <span class="nav-label">Equipe Técnica</span>
      </a>
      <a mat-list-item routerLink="clientes" routerLinkActive="active-link" class="link-clientes">
        <mat-icon class="nav-icon">group</mat-icon>
        <span class="nav-label">Base de Clientes</span>
      </a>
      <a mat-list-item routerLink="chamados" routerLinkActive="active-link" class="link-chamados">
        <mat-icon class="nav-icon">receipt_long</mat-icon>
        <span class="nav-label">Central de Chamados</span>
      </a>
      <a mat-list-item routerLink="chart" routerLinkActive="active-link" class="link-chart">
        <mat-icon class="nav-icon">bar_chart</mat-icon>
        <span class="nav-label">Gráfico</span>
      </a>
      <a mat-list-item routerLink="chat" routerLinkActive="active-link" class="link-chat">
        <mat-icon class="nav-icon">forum</mat-icon>
        <span class="nav-label">Conversas</span>
      </a>
      <a mat-list-item routerLink="usuarios" routerLinkActive="active-link" class="link-usuarios">
        <mat-icon class="nav-icon">manage_accounts</mat-icon>
        <span class="nav-label">Gestão de Usuários</span>
      </a>
    </mat-nav-list>

    <!-- ── Espaçador flexível ── -->
    <div class="sidenav-spacer"></div>

    <!-- ── Rodapé: sair ── -->
    <div class="sidenav-footer">
      <div class="footer-divider"></div>
      <a mat-list-item class="logout-item" (click)="logout()">
        <mat-icon class="nav-icon">logout</mat-icon>
        <span class="nav-label">Sair</span>
      </a>
    </div>
  </mat-drawer>

  <!-- HEADER SEMPRE NO TOPO -->
  <div class="header-wrapper">
    <app-header></app-header>
  </div>

  <!-- MAIN CONTENT BELOW HEADER -->
  <div class="sidenav-content">
    <router-outlet></router-outlet>
  </div>
</mat-drawer-container>

<!-- Widget flutuante de chat (visível em todas as páginas) -->
<app-chat-bubble></app-chat-bubble>
<!-- Janelas de DM flutuantes (abertas via bubble ou notificação) -->
<app-floating-chat></app-floating-chat>
