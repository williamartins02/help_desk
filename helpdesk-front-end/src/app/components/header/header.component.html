<mat-toolbar class="header-toolbar mat-elevation-z6">
  <!-- Hamburger menu button slot (projected from parent) -->
  <span class="header-menu-slot"><ng-content></ng-content></span>

  <!-- ── Marca / Brand ── -->
  <div class="header-brand">
    <div class="brand-icon">
      <mat-icon>support_agent</mat-icon>
    </div>
    <div class="brand-text">
      <span class="brand-title">Help Desk</span>
      <span class="brand-subtitle">Sistema de Suporte</span>
    </div>
  </div>

  <span class="header-spacer"></span>

  <!-- ── Centro / Tagline ── -->
  <div class="header-center">
    <mat-icon class="pulse-icon">headset_mic</mat-icon>
    <span class="header-tagline">Central de Atendimento</span>
  </div>

  <span class="header-spacer"></span>

  <!-- ── Direita / Usuário + Relógio ── -->
  <div class="header-right">
    <div class="header-datetime">
      <mat-icon class="datetime-icon">access_time</mat-icon>
      <div class="datetime-text">
        <span class="time">{{ currentTime | date:'HH:mm:ss' }}</span>
        <span class="date">{{ currentTime | date:'dd/MM/yyyy' }}</span>
      </div>
    </div>
    <div class="header-divider"></div>
    <div class="user-chip">
      <div class="user-avatar">{{ getUserInitial() }}</div>
      <div class="user-details">
        <span class="user-label">Conectado como</span>
        <span class="user-email">{{ userEmail }}</span>
      </div>
    </div>
  </div>
</mat-toolbar>
