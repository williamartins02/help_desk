<div class="forgot-wrapper">
  <div class="forgot-card mat-elevation-z12">

    <!-- Cabeçalho -->
    <div class="forgot-header">
      <mat-icon class="header-icon">lock_reset</mat-icon>
      <h2>Redefinir Senha</h2>
      <p class="subtitle">Informe seu e-mail cadastrado e enviaremos as instruções para redefinir sua senha.</p>
    </div>

    <!-- Formulário -->
    <ng-container *ngIf="!enviado; else successBlock">
      <mat-form-field class="full-width" appearance="outline">
        <mat-label>E-mail</mat-label>
        <mat-icon matPrefix class="field-icon">email</mat-icon>
        <input [formControl]="email" matInput placeholder="fulano@mail.com" required>
        <mat-error *ngIf="email.hasError('required')">O e-mail é obrigatório</mat-error>
        <mat-error *ngIf="email.hasError('email')">Informe um e-mail válido</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" class="full-width send-btn"
              (click)="enviar()" [disabled]="email.invalid || loading">
        <mat-icon>send</mat-icon>
        {{ loading ? 'Enviando...' : 'ENVIAR INSTRUÇÕES' }}
      </button>
    </ng-container>

    <!-- Mensagem de sucesso -->
    <ng-template #successBlock>
      <div class="success-box">
        <mat-icon class="success-icon">mark_email_read</mat-icon>
        <p>Verifique sua caixa de entrada e siga as instruções para redefinir sua senha.</p>
      </div>
    </ng-template>

    <!-- Voltar para login -->
    <div class="back-link">
      <button mat-button color="primary" (click)="voltar()">
        <mat-icon>arrow_back</mat-icon>
        Voltar para o login
      </button>
    </div>
  </div>
</div>
