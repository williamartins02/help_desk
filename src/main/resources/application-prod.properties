# ─────────────────────────────────────────────────────────────────
# Configurações do perfil de PRODUÇÃO
# As credenciais são lidas de variáveis de ambiente para evitar
# que segredos fiquem expostos no código-fonte.
# ─────────────────────────────────────────────────────────────────

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# URL base para o link de redefinição de senha no e-mail
app.reset-password.base-url=${APP_BASE_URL}/redefinir-senha

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

